<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Country Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INTRO -->
<img id="intro" src="intro.png">

<!-- MAIN BACKGROUND -->
<img id="background" src="background.png">

<!-- MONEY -->
<div id="money">Money: 0</div>

<!-- DATE -->
<div id="date">1/1/1000</div>

<!-- PAUSE & RESUME -->
<img id="pauseBtn" src="pause.png">
<img id="resumeBtn" src="resume.png">

<!-- ACTION BUTTON -->
<img id="actionBtn" src="action.png">

<!-- SPEED BUTTON -->
<img id="speedBtn" src="1x.png">

<!-- RESEARCH BUTTON -->
<img id="researchBtn" src="research.png">

<!-- ACTION SCREEN -->
<div id="actionScreen" class="overlay">
    <img id="backFromAction" class="backBtn" src="back.png">
</div>

<!-- RESEARCH SCREEN -->
<div id="researchScreen" class="overlay">
    <img id="backFromResearch" class="backBtn" src="back.png">
</div>

<script src="script.js"></script>
</body>
</html>
